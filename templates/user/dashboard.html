<!DOCTYPE html>
<html>
<head>
    <title>Dashboard | Civic System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f4f8; }

        .navbar {
            background: #1a73e8;
            color: white;
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar .logo { font-size: 16px; font-weight: bold; }
        .navbar a { color: white; text-decoration: none; font-size: 13px; margin-left: 20px; }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }

        h2 { font-size: 24px; color: #2c3e50; margin-bottom: 8px; }
        .sub { font-size: 14px; color: #888; margin-bottom: 36px; }

        /* Quick action cards */
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            text-decoration: none;
            color: #2c3e50;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
        }

        .card .icon { font-size: 40px; margin-bottom: 12px; }
        .card h3 { font-size: 16px; margin-bottom: 6px; }
        .card p { font-size: 13px; color: #888; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">🏛️ Civic Issue Reporting</div>
        <div>
            <a href="/logout">Logout</a>
        </div>
    </div>

    <div class="container">
        <h2>Welcome, {{ session['user_name'] }}! 👋</h2>
        <p class="sub">What would you like to do today?</p>

        <div class="cards">
            <a href="/complaint" class="card">
                <div class="icon">📝</div>
                <h3>Report New Issue</h3>
                <p>Submit a new civic complaint in your area</p>
            </a>

            <a href="/my-complaints" class="card">
                <div class="icon">📋</div>
                <h3>My Complaints</h3>
                <p>Track status of your submitted complaints</p>
            </a>
        </div>
    </div>

</body>
</html>
